
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McM Order Form</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#FAF7F1;
  --paper-dark:#F1EADA;
  --card:#FFFFFF;
  --ink:#1C1815;
  --ink-soft:#6b5f4d;
  --gold:#C2AB6C;
  --gold-dark:#A38A4E;
  --chilli:#AE3A26;
  --chilli-dark:#8A2C1B;
  --turmeric:#C68A1E;
  --cardamom:#3F6B4A;
  --lentil:#8A6D3B;
  --teal:#3F6B6B;
  --brown:#7A5230;
  --line:#E6DDC8;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{ font-family:'Fraunces',serif; font-weight:600; letter-spacing:-0.01em; }
.mono{ font-family:'IBM Plex Mono',monospace; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; }
::selection{ background:var(--gold); color:var(--ink); }

/* ---- Header ---- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 22px; border-bottom:2px solid var(--ink);
  background:var(--paper);
  position:sticky; top:0; z-index:50;
  flex-wrap:wrap; gap:10px;
}
.brand{ display:flex; align-items:center; gap:12px; }
.stamp-mark{ width:38px; height:38px; flex:none; }
.brand-logo{ height:46px; width:auto; flex:none; display:block; }
.brand-text .name{ font-size:22px; line-height:1; }
.brand-text .tag{ font-size:11px; color:var(--ink-soft); letter-spacing:.08em; text-transform:uppercase; margin-top:3px; }
.nav-links{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.nav-btn{
  background:none; border:1px solid transparent; color:var(--ink-soft);
  font-size:13px; padding:8px 12px; border-radius:20px; transition:.15s;
}
.nav-btn.active{ background:var(--ink); color:var(--gold); }
.nav-btn:not(.active):hover{ border-color:var(--line); color:var(--ink); }
.nav-btn.help-btn{ border-color:var(--cardamom); color:var(--cardamom); }
.nav-btn.help-btn:hover{ background:var(--cardamom); color:#fff; }
.nav-badge{ background:var(--chilli); color:#fff; border-radius:10px; font-size:10.5px; font-weight:700; padding:1px 6px; margin-left:4px; vertical-align:middle; }

/* ---- Layout ---- */
.wrap{ max-width:920px; margin:0 auto; padding:22px 18px 100px; }
.hero{ padding:6px 0 22px; border-bottom:1px solid var(--gold); margin-bottom:20px; }
.hero h1{ font-size:30px; margin:0 0 6px; }
.hero p{ color:var(--ink-soft); font-size:14.5px; margin:0; max-width:520px; }

/* ---- Controls ---- */
.controls{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
.search-box{
  flex:1; min-width:180px; position:relative;
}
.search-box input{
  width:100%; padding:11px 14px; border:1.5px solid var(--ink); border-radius:10px;
  background:var(--card); font-size:14px; color:var(--ink);
}
.search-box input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
.cat-scroll{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px; scrollbar-width:thin; }
.cat-chip{
  flex:none; padding:8px 14px; border-radius:20px; border:1.5px solid var(--ink);
  background:var(--card); font-size:13px; font-weight:500; white-space:nowrap; transition:.15s;
}
.cat-chip.active{ background:var(--ink); color:var(--paper); }

/* ---- Product ledger ---- */
.cat-heading{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold-dark); margin:26px 0 10px; font-weight:700; }
.product-row{
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; margin-bottom:10px; display:flex; flex-direction:column; gap:10px;
}
.product-row.in-cart{ border-color:var(--cardamom); box-shadow:0 0 0 1.5px var(--cardamom) inset; }
.product-row.unavailable{ opacity:.6; background:var(--paper-dark); }
.p-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.p-left{ display:flex; align-items:center; gap:12px; min-width:0; }
.p-icon{
  width:42px; height:42px; border-radius:50%; flex:none;
  display:flex; align-items:center; justify-content:center; color:#fff;
}
.p-icon svg{ width:21px; height:21px; }
.p-names{ min-width:0; }
.p-sr{ font-size:11px; color:var(--ink-soft); flex:none; }
.p-name{ font-size:15.5px; font-weight:600; }
.p-lang{ font-size:11.5px; color:var(--ink-soft); margin-top:1px; }
.unavail-badge{ font-size:11px; font-weight:700; color:var(--chilli); border:1.5px solid var(--chilli); border-radius:6px; padding:3px 8px; text-transform:uppercase; letter-spacing:.05em; }
.tick{
  appearance:none; -webkit-appearance:none; width:25px; height:25px; flex:none;
  border:2px solid var(--ink); border-radius:7px; background:var(--card); cursor:pointer; position:relative;
  transition:.15s;
}
.tick:checked{ background:var(--gold); border-color:var(--gold); }
.tick:checked::after{
  content:''; position:absolute; left:8px; top:4px; width:6px; height:12px;
  border:solid #fff; border-width:0 2.5px 2.5px 0; transform:rotate(40deg);
}
.pack-row{ display:flex; gap:8px; flex-wrap:wrap; }
.pack-lines{ display:flex; flex-direction:column; gap:8px; }
.pack-line{ display:flex; justify-content:space-between; align-items:center; border:1.5px solid var(--line); border-radius:9px; padding:8px 10px; background:var(--paper); transition:.15s; }
.pack-line.added{ border-color:var(--gold); background:var(--card); box-shadow:0 0 0 1px var(--gold) inset; }
.pl-info{ display:flex; flex-direction:column; gap:1px; }
.pl-label{ font-size:13px; font-weight:600; }
.pl-price{ font-size:12px; color:var(--ink-soft); }
.pl-price.tbd{ color:var(--chilli); font-style:italic; }
.pl-qty{ display:flex; align-items:center; gap:10px; }
.pack-pill{
  border:1.5px solid var(--line); background:var(--paper); border-radius:9px;
  padding:7px 11px; font-size:12.5px; display:flex; flex-direction:column; align-items:center; gap:2px; min-width:64px;
  transition:.15s;
}
.pack-pill .pl{ color:var(--ink-soft); font-size:11px; }
.pack-pill .pp{ font-weight:600; }
.pack-pill.selected{ background:var(--ink); border-color:var(--ink); color:var(--paper); }
.pack-pill.selected .pl{ color:#d8cdb4; }
.pack-pill.tbd .pp{ color:var(--chilli); font-style:italic; font-weight:500; }
.p-action{ display:flex; align-items:center; gap:10px; }
.qty-stepper{ display:flex; align-items:center; border:1.5px solid var(--ink); border-radius:8px; overflow:hidden; }
.qty-stepper button{ background:var(--paper); border:none; width:30px; height:30px; font-size:16px; }
.qty-stepper button:disabled{ opacity:.4; cursor:not-allowed; }
.qty-stepper span{ width:34px; text-align:center; font-size:14px; font-weight:600; }
.qty-label{ font-size:12px; color:var(--ink-soft); }
.empty-note{ color:var(--ink-soft); font-size:13.5px; padding:30px 0; text-align:center; }

/* ---- Cart FAB & panel ---- */
.cart-fab{
  position:fixed; right:20px; bottom:20px; background:var(--ink); color:var(--paper);
  border:none; border-radius:30px; padding:14px 20px; font-size:14px; font-weight:600;
  display:flex; align-items:center; gap:8px; box-shadow:0 6px 18px rgba(36,26,18,.3); z-index:60;
}
.cart-fab .count{ background:var(--gold); color:var(--ink); border-radius:50%; width:22px; height:22px; display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; }
.overlay{ position:fixed; inset:0; background:rgba(36,26,18,.45); z-index:70; display:none; }
.overlay.show{ display:block; }
.panel{
  position:fixed; right:0; top:0; bottom:0; width:min(400px,92vw); background:var(--paper);
  z-index:80; transform:translateX(100%); transition:transform .25s ease; display:flex; flex-direction:column;
  border-left:2px solid var(--ink);
}
.panel.show{ transform:translateX(0); }
.panel-head{ padding:18px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
.panel-head h3{ margin:0; font-size:18px; }
.panel-close{ background:none; border:none; font-size:20px; color:var(--ink-soft); }
.panel-body{ flex:1; overflow-y:auto; padding:12px 18px; }
.cart-item{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed var(--line); gap:10px; }
.cart-item .ci-name{ font-size:13.5px; font-weight:600; }
.cart-item .ci-pack{ font-size:11.5px; color:var(--ink-soft); }
.cart-item .ci-price{ font-size:13px; white-space:nowrap; }
.rm-btn{ background:none; border:none; color:var(--chilli); font-size:12px; text-decoration:underline; padding:0; }
.panel-foot{ padding:16px 18px; border-top:1.5px solid var(--ink); background:var(--card); }
.total-row{ display:flex; justify-content:space-between; font-size:15px; font-weight:700; margin-bottom:12px; }
.primary-btn{
  width:100%; background:var(--ink); color:var(--gold); border:none; padding:13px; border-radius:9px;
  font-size:14.5px; font-weight:700; letter-spacing:.01em;
}
.primary-btn:hover{ background:#000; }
.primary-btn:disabled{ background:var(--line); color:var(--ink-soft); cursor:not-allowed; }
.field{ margin-bottom:12px; }
.field label{ display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:600; }
.field input, .field textarea{
  width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:8px; font-size:14px; background:#fff;
}
.field textarea{ resize:vertical; min-height:60px; }
.back-link{ background:none; border:none; color:var(--ink-soft); font-size:13px; text-decoration:underline; padding:0 0 12px; }

/* ---- Confirmation ---- */
.confirm-wrap{ text-align:center; padding:50px 20px; }
.stamp-anim{ width:120px; height:120px; margin:0 auto 18px; }
.confirm-wrap h2{ font-size:24px; margin:0 0 8px; }
.confirm-wrap p{ color:var(--ink-soft); font-size:14px; }
.confirm-ref{ display:inline-block; margin-top:10px; background:var(--card); border:1.5px dashed var(--ink); padding:8px 16px; border-radius:8px; font-size:13px;}

/* ---- Office ---- */
.pin-wrap{ max-width:320px; margin:80px auto; text-align:center; }
.pin-wrap h2{ font-size:20px; margin-bottom:6px;}
.pin-wrap p{ color:var(--ink-soft); font-size:13px; margin-bottom:16px; }
.pin-wrap input{ width:100%; text-align:center; letter-spacing:.3em; font-size:20px; padding:12px; border:1.5px solid var(--ink); border-radius:8px; margin-bottom:12px; }
.pin-err{ color:var(--chilli); font-size:12.5px; min-height:16px; }
.office-tabs{ display:flex; gap:8px; margin-bottom:18px; border-bottom:2px solid var(--ink); }
.office-tab{ background:none; border:none; padding:10px 14px; font-size:14px; font-weight:600; color:var(--ink-soft); border-bottom:3px solid transparent; margin-bottom:-2px; }
.office-tab.active{ color:var(--ink); border-color:var(--gold); }
.live-banner{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; background:var(--card); border:1.5px solid var(--line); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:13px; }
.live-banner-btns{ display:flex; gap:8px; }
.status-filters{ display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.sf-chip{ padding:6px 13px; border-radius:16px; border:1.5px solid var(--line); font-size:12.5px; background:var(--card); }
.sf-chip.active{ border-color:var(--ink); background:var(--ink); color:var(--paper); }
.order-card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:14px; }
.oc-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.oc-ref{ font-size:11.5px; color:var(--ink-soft); }
.oc-name{ font-size:16px; font-weight:700; margin-top:2px; }
.oc-phone{ font-size:13px; color:var(--ink-soft); }
.oc-time{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
.stamp{
  font-size:11px; font-weight:700; padding:6px 12px; border-radius:5px; border:2px solid; text-transform:uppercase;
  letter-spacing:.06em; transform:rotate(-2deg); display:inline-block;
}
.stamp.New{ color:var(--turmeric); border-color:var(--turmeric); }
.stamp.Processing{ color:var(--chilli); border-color:var(--chilli); }
.stamp.Billed{ color:var(--cardamom); border-color:var(--cardamom); }
.oc-items{ margin-top:12px; border-top:1px dashed var(--line); padding-top:10px; }
.oc-item-row{ display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }
.oc-item-row .oi-name{ font-weight:500; }
.oc-item-row .oi-meta{ color:var(--ink-soft); }
.oc-notes{ font-size:12.5px; color:var(--ink-soft); margin-top:8px; font-style:italic; }
.oc-total{ display:flex; justify-content:space-between; font-weight:700; font-size:14px; margin-top:8px; padding-top:8px; border-top:1px solid var(--line); }
.oc-controls{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.status-btn{ font-size:12px; padding:7px 12px; border-radius:7px; border:1.5px solid var(--line); background:#fff; }
.status-btn.current{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.print-btn{ background:none; border:1.5px solid var(--ink); padding:7px 12px; border-radius:7px; font-size:12px; }

/* Catalog admin */
.admin-row{ display:flex; gap:8px; align-items:center; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; flex-wrap:wrap; }
.admin-row.is-disabled{ background:var(--paper-dark); opacity:.75; }
.admin-row input{ padding:6px 8px; border:1px solid var(--line); border-radius:6px; font-size:12.5px; }
.admin-row .a-name{ flex:1; min-width:160px; }
.admin-row .a-pack{ width:80px; }
.admin-row .a-price{ width:70px; }
.avail-toggle{ display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; padding:5px 9px; border-radius:14px; border:1.5px solid var(--line); background:#fff; white-space:nowrap; }
.avail-toggle.is-avail{ color:var(--cardamom); border-color:var(--cardamom); }
.avail-toggle.is-unavail{ color:var(--chilli); border-color:var(--chilli); background:#fdf1ee; }
.del-x{ background:none; border:none; color:var(--chilli); font-size:16px; padding:0 4px; }
.add-pack-btn, .add-prod-btn{ background:var(--paper-dark); border:1px dashed var(--ink-soft); border-radius:7px; padding:6px 10px; font-size:12px; }
.save-bar{ position:sticky; bottom:0; background:var(--paper); padding:12px 0; border-top:2px solid var(--ink); margin-top:10px; }
.saved-flash{ color:var(--cardamom); font-size:12.5px; margin-left:10px; }

/* Identify / register */
.identify-wrap{ max-width:360px; margin:60px auto; text-align:center; }
.identify-wrap h2{ font-size:22px; margin-bottom:6px; }
.identify-wrap p{ color:var(--ink-soft); font-size:13.5px; margin-bottom:18px; }
.identify-wrap .field{ text-align:left; }
.identify-err{ color:var(--chilli); font-size:12.5px; min-height:16px; margin-bottom:6px; }
.customer-badge{
  display:flex; justify-content:space-between; align-items:center; background:var(--card);
  border:1.5px solid var(--gold); border-radius:10px; padding:12px 14px; margin-bottom:14px; font-size:13.5px;
  flex-wrap:wrap; gap:10px;
}
.customer-badge .cb-name{ font-weight:700; }
.customer-badge .cb-meta{ color:var(--ink-soft); font-size:12px; margin-top:2px; }
.customer-badge .cb-btns{ display:flex; gap:14px; }
.customer-badge button{ background:none; border:none; color:var(--chilli); font-size:12px; text-decoration:underline; }

/* Account / order history */
.account-wrap{ max-width:560px; margin:0 auto; }
.account-section{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px; }
.account-section h3{ margin:0 0 12px; font-size:16px; }
.saved-msg{ color:var(--cardamom); font-size:12.5px; margin-left:10px; }
.oh-order{ border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px; background:var(--card); }
.oh-head{ display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
.oh-ref{ font-size:12px; color:var(--ink-soft); }
.oh-items{ font-size:12.5px; color:var(--ink-soft); margin-top:6px; }
.oh-total{ font-weight:700; margin-top:6px; font-size:13.5px; }

/* Orders table (office) */
.orders-table{ width:100%; border-collapse:collapse; margin-bottom:10px; }
.table-scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:10px; }
.table-scroll .orders-table{ margin-bottom:0; min-width:560px; }
.orders-table th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); padding:8px 8px; border-bottom:2px solid var(--ink); }
.orders-table td{ padding:10px 8px; border-bottom:1px solid var(--line); font-size:13.5px; vertical-align:top; }
.ot-row{ cursor:pointer; }
.ot-row:hover{ background:var(--paper-dark); }
.ot-row .ot-sr{ font-weight:700; }
.ot-row .ot-phone{ color:var(--ink-soft); font-size:12px; }
.ot-detail td{ background:var(--card); padding:16px; border-bottom:1px solid var(--line); }
.ot-caret{ color:var(--ink-soft); font-size:12px; }

.footer-note{ text-align:center; padding:30px 0 10px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.footer-note button{ background:none; border:none; color:var(--ink-soft); font-size:11.5px; text-decoration:underline; }
.help-fab{
  position:fixed; left:20px; bottom:20px; background:var(--cardamom); color:#fff;
  border:none; border-radius:30px; padding:12px 18px; font-size:13px; font-weight:600;
  display:flex; align-items:center; gap:8px; box-shadow:0 6px 18px rgba(36,26,18,.25); z-index:55;
  text-decoration:none;
}
.help-fab:hover{ background:#335a3d; }

@media print{
  .topbar,.cart-fab,.help-fab,.overlay,.panel,.controls,.cat-scroll,.status-filters,.office-tabs,.oc-controls,.footer-note,.hero p,.ot-caret,.customer-badge button{ display:none !important; }
  body{ background:#fff; }
  .order-card{ break-inside:avoid; border:1px solid #999; }
  .ot-row,.ot-detail{ break-inside:avoid; }
}
/* ---- Responsive: tablet ---- */
@media (max-width:900px){
  .wrap{ padding:18px 16px 100px; }
  .hero h1{ font-size:26px; }
}

/* ---- Responsive: phone ---- */
@media (max-width:640px){
  .wrap{ padding:14px 12px 110px; }
  .topbar{ padding:12px 14px; }
  .brand-logo{ height:34px; }
  .nav-links{ gap:4px; }
  .nav-btn{ font-size:12px; padding:7px 10px; }
  .hero h1{ font-size:22px; }
  .hero p{ font-size:13.5px; }
  .cat-heading{ font-size:11px; }
  .product-row{ padding:12px; }
  .p-name{ font-size:14.5px; }
  .pack-line{ flex-wrap:wrap; row-gap:8px; padding:8px; }
  .pl-qty{ margin-left:auto; }
  .cart-fab{ right:12px; bottom:12px; padding:12px 16px; font-size:13px; }
  .help-fab{ left:12px; bottom:12px; padding:10px 14px; font-size:12px; }
  .panel{ width:100vw; }
  .identify-wrap, .pin-wrap{ margin-top:36px; max-width:100%; padding:0 4px; }
  .office-tabs{ overflow-x:auto; -webkit-overflow-scrolling:touch; flex-wrap:nowrap; }
  .office-tab{ white-space:nowrap; padding:10px 12px; font-size:13px; }
  .admin-row{ padding:10px; }
  .admin-row .a-name{ min-width:100%; }
  .oc-controls{ gap:6px; }
  .status-btn, .print-btn{ font-size:11.5px; padding:6px 10px; }
  .live-banner{ flex-direction:column; align-items:flex-start; }
}
@media (max-width:380px){
  .brand-logo{ height:28px; }
  .nav-btn{ font-size:11px; padding:6px 8px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-text">
      <div class="name display">McM</div>
      <div class="tag">Order Form</div>
    </div>
  </div>
  <div class="nav-links" id="navLinks"></div>
</div>

<div class="wrap" id="app"></div>

<div class="overlay" id="overlay"></div>
<div class="panel" id="cartPanel"></div>

<script>
/* ============ CATALOG SEED ============ */
const C1="Spices Powder", C2="Masala Powder", C3="Whole Spices", C4="Pulses & Grains", C5="Cafeteria Items", C6="General Items";
const CATEGORIES=[C1,C2,C3,C4,C5,C6];
function pk(l,p){ return {l:l, p:p}; }

async function apiCall(payload){
  if(!API_URL || API_URL.indexOf("PASTE_YOUR")===0){
    console.warn("API_URL not set yet");
    return {ok:false, error:"not-configured"};
  }
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });
    return await res.json();
  }catch(e){
    console.error("Backend call failed", e);
    return {ok:false, error:String(e)};
  }
}

  try{
    const r=await apiCall({action:'get', key:'catalog'});
    state.catalog = (r.ok && r.value)? JSON.parse(r.value) : CATALOG_SEED;
    if(r.ok && !r.value){ await apiCall({action:'set', key:'catalog', value:JSON.stringify(CATALOG_SEED)}); }

function cartLine(item){
  const p=findProduct(item.pid); if(!p) return null;
  const pack=p.packs[item.packIdx]; if(!pack) return null;
  return {p,pack,qty:item.qty};
}
function cartTotal(){
  let t=0;
  state.cart.forEach(it=>{ const l=cartLine(it); if(l && l.pack.p!=null) t+=l.pack.p*l.qty; });
  return t;
}
function refFor(order){ return "McM-"+String(order.seq).padStart(4,"0"); }

function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [880,660].forEach((freq,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='sine'; o.frequency.value=freq;
      const t0 = ctx.currentTime + i*0.22;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.35, t0+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+0.35);
      o.connect(g); g.connect(ctx.destination);
      o.start(t0); o.stop(t0+0.4);
    });
  }catch(e){}
}

function startOrderPolling(){
  if(state.pollTimer) return;
  state.pollTimer = setInterval(pollForNewOrders, 15000);
}
async function pollForNewOrders(){
  if(!state.officeAuthed) return;
  await loadOrders();
  const newOnes = state.orders.filter(o=>(o.seq||0) > state.lastKnownMaxSeq);
  if(newOnes.length){
    newOnes.sort((a,b)=>a.seq-b.seq).forEach(o=>{ playBeep(); showOrderNotification(o); });
    state.lastKnownMaxSeq = state.orders.reduce((m,o)=>Math.max(m,o.seq||0), state.lastKnownMaxSeq);
  }
  state.newOrderCount = state.orders.filter(o=>o.status==='New').length;
  renderNav();
  if(state.view==='office' && state.officeTab==='orders'){ renderOfficeView(); }
}

function renderNav(){

async function submitPhone(){
  const phone=document.getElementById('idPhone').value.trim();
  if(!phone){ state.identifyError="Please enter your phone number."; renderOrderView(); return; }
  await loadCustomers();
  const match=state.customers.find(c=>normPhone(c.phone)===normPhone(phone));
  state.identifyPhone=phone; state.identifyError="";
  if(match){
    state.pendingCustomer=match; state.orderSub="login"; state.loginError="";
  } else {
    state.orderSub="register";
  }
  render();
}
async function submitLogin(){
  const pin=document.getElementById('loginPin').value.trim();
  const c=state.pendingCustomer;
  if(!c){ backToPhone(); return; }
  if(!c.pin){
    state.customer=c; state.orderSub="browse"; state.loginError=""; render(); return;
  }
  if(pin===c.pin){
    state.customer=c; state.orderSub="browse"; state.loginError="";
  } else {
    state.loginError="Incorrect PIN. Please try again.";
  }
  render();
}
async function submitRegister(){
  const name=document.getElementById('regName').value.trim();
  const address=document.getElementById('regAddress').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const trn=document.getElementById('regTrn').value.trim();
  const pin=document.getElementById('regPin').value.trim();
  const pin2=document.getElementById('regPin2').value.trim();
  if(!name){ state.identifyError="Please enter your store/customer name."; renderOrderView(); return; }
  if(!address){ state.identifyError="Please enter your delivery address."; renderOrderView(); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ state.identifyError="Please enter a valid email — we send your order confirmation there."; renderOrderView(); return; }
  if(!/^\d{4}$/.test(pin)){ state.identifyError="Please set a 4-digit PIN (numbers only)."; renderOrderView(); return; }
  if(pin!==pin2){ state.identifyError="PINs don't match — please re-enter."; renderOrderView(); return; }
  await loadCustomers();
  const seq=(state.customers.reduce((m,c)=>Math.max(m,c.seq||0),0))+1;

}

async function saveAccount(){
  const c=state.customer;
  const name=document.getElementById('accName').value.trim();
  const address=document.getElementById('accAddress').value.trim();
  const email=document.getElementById('accEmail').value.trim();
  const trn=document.getElementById('accTrn').value.trim();
  const pin=document.getElementById('accPin').value.trim();
  const pin2=document.getElementById('accPin2').value.trim();
  const errEl=document.getElementById('accErr');
  if(!name){ errEl.textContent="Please enter a store name."; return; }
  if(!address){ errEl.textContent="Please enter a delivery address."; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ errEl.textContent="Please enter a valid email."; return; }
  if(pin || pin2){
    if(!/^\d{4}$/.test(pin) || pin!==pin2){ errEl.textContent="New PIN must be 4 digits and match the confirmation."; return; }
  }
  errEl.textContent="";
  c.name=name; c.address=address; c.email=email; c.trn=trn;
  if(pin) c.pin=pin;
  await loadCustomers();
  const idx=state.customers.findIndex(x=>x.id===c.id);
  if(idx>-1) state.customers[idx]=c; else state.customers.push(c);
  await saveCustomers();
  state.accountSaved=true;
  render();
  setTimeout(()=>{ state.accountSaved=false; },2500);
}

  });

  let html=`
  <div class="customer-badge">
    <div><div class="cb-name">${state.customer.name}</div><div class="cb-meta">${state.customer.phone}${state.customer.trn? ' · TRN '+state.customer.trn : ''}${state.customer.address? ' · '+state.customer.address : ''}</div></div>

      if(!grouped[cat]) return;
      html+=`<div class="cat-heading">${cat}</div>`;

        const isUnavail = !!p.disabled;
        const inCartAny = state.cart.some(c=>c.pid===p.id);
        html+=`<div class="product-row ${inCartAny?'in-cart':''} ${isUnavail?'unavailable':''}" id="row-${p.id}">

              <div class="p-names">
                <div><span class="p-sr mono">#${p.id}</span> <span class="p-name">${p.name}</span></div>
                <div class="p-lang">${[p.ml,p.hi].filter(Boolean).join(' · ')}</div>
              </div>
            </div>
            ${isUnavail? `<span class="unavail-badge">Currently unavailable</span>` : ''}
          </div>
          <div class="pack-lines">
            ${p.packs.map((pk,i)=>{
              const inCartItem = state.cart.find(c=>c.pid===p.id && c.packIdx===i);
              const qty = inCartItem ? inCartItem.qty : (state.packQty[p.id+'-'+i] || 0);
              return `<div class="pack-line ${inCartItem?'added':''}">
                <div class="pl-info"><span class="pl-label">${pk.l}</span><span class="pl-price mono ${pk.p==null?'tbd':''}">${pk.p==null?'Ask price':fmt(pk.p)}</span></div>

  html+=`</div>`;

function onSearch(v){ state.search=v; renderOrderView(); document.getElementById('searchInput').focus(); document.getElementById('searchInput').setSelectionRange(v.length,v.length); }
function setCat(c){ state.filterCat=c; renderOrderView(); }
function stepPackQty(pid, idx, delta){
  const p=findProduct(pid);
  if(p && p.disabled) return;
  const key=pid+'-'+idx;
  const el=document.getElementById('qty-'+pid+'-'+idx);
  let v=parseInt(el.textContent)+delta; if(v<0) v=0;
  el.textContent=v;
  state.packQty[key]=v;
  const existingIdx=state.cart.findIndex(c=>c.pid===pid && c.packIdx===idx);
  if(v<=0){
    if(existingIdx>-1) state.cart.splice(existingIdx,1);
  } else {
    if(existingIdx>-1) state.cart[existingIdx].qty=v; else state.cart.push({pid,packIdx:idx,qty:v});
  }
  const line=el.closest('.pack-line'); if(line) line.classList.toggle('added', v>0);
  const row=el.closest('.product-row'); if(row) row.classList.toggle('in-cart', state.cart.some(c=>c.pid===pid));
  renderCartFab();
  if(state.cartOpen) renderCartPanel();
}

  fab.innerHTML=`Your list <span class="count">${count}</span>`;
}

async function placeOrder(){
  const notes=document.getElementById('fNotes').value.trim();
  if(!state.customer){ switchCustomer(); return; }
  state.form={notes};
  const items=state.cart.map(it=>{ const l=cartLine(it); return {name:l.p.name, pack:l.pack.l, price:l.pack.p, qty:l.qty}; });
  await loadOrders();
  const seq=(state.orders.reduce((m,o)=>Math.max(m,o.seq||0),0))+1;
  const order={ id:'o'+Date.now()+Math.random().toString(36).slice(2,6), seq, customerId:state.customer.id,
    name:state.customer.name, phone:state.customer.phone, address:state.customer.address, trn:state.customer.trn,
    notes, items, status:"New", createdAt:new Date().toISOString() };
  state.orders.push(order);
  state.newOrderCount = state.orders.filter(o=>o.status==='New').length;
  state.lastOrderRef=refFor(order);
  const total=items.reduce((s,it)=>s+(it.price!=null?it.price*it.qty:0),0);

  const [, notifyRes] = await Promise.all([
    saveOrders(),
    apiCall({action:'notifyOrder', order:{
      ref: state.lastOrderRef, name:order.name, phone:order.phone, address:order.address,
      trn:order.trn, email:state.customer.email||'', items:order.items, notes:order.notes, total
    }})
  ]);
  state.notifyStatus = (notifyRes && notifyRes.ok) ? 'ok' : 'failed';

  state.cart=[]; state.packQty={};
  state.step="confirm";
  renderNav();
  renderCartPanel();
}
function waLinkForOwnerCopy(){
  const o=state.orders[state.orders.length-1];
  if(!o) return '#';
  const total=o.items.reduce((s,it)=>s+(it.price!=null?it.price*it.qty:0),0);
  const lines=o.items.map(it=>`• ${it.name} (${it.pack}) x${it.qty}`).join('%0A');
  const text=`Order ${state.lastOrderRef} - ${o.name} (${o.phone})%0A${lines}%0ATotal: ${CURRENCY} ${total.toFixed(2)}${o.notes?'%0ANote: '+encodeURIComponent(o.notes):''}`;
  return `https://wa.me/${SHOP_WHATSAPP}?text=${text}`;
}

function renderOfficeView(){
  if(!state.officeAuthed){
    document.getElementById('app').innerHTML=`
      <div class="pin-wrap">
        <h2 class="display">Office access</h2>
        <p>Enter the office PIN to view and manage orders.</p>
        <input id="pinInput" type="password" maxlength="6" placeholder="••••">
        <div class="pin-err">${state.pinError}</div>
        <button class="primary-btn" onclick="checkPin()">Enter</button>
      </div>`;
    document.getElementById('pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPin(); });
    return;
  }
  let html=`
  <div class="hero"><h1>Office dashboard</h1><p>Review incoming orders and move each one through New → Processing → Billed. Use your browser's print (Ctrl/Cmd+P) for a paper copy.</p></div>
  ${renderLiveBanner()}
  <div class="office-tabs">
    <button class="office-tab ${state.officeTab==='orders'?'active':''}" onclick="setOfficeTab('orders')">Orders</button>
    <button class="office-tab ${state.officeTab==='customers'?'active':''}" onclick="setOfficeTab('customers')">Customers</button>
    <button class="office-tab ${state.officeTab==='catalog'?'active':''}" onclick="setOfficeTab('catalog')">Manage Products</button>
  </div>`;
  if(state.officeTab==='orders'){ html+=renderOrdersTab(); }
  else if(state.officeTab==='customers'){ html+=renderCustomersTab(); }
  else{ html+=renderCatalogTab(); }
  document.getElementById('app').innerHTML=html;
}
function checkPin(){
  const v=document.getElementById('pinInput').value;
  if(v===OFFICE_PIN){
    state.officeAuthed=true; state.pinError="";
    Promise.all([loadOrders(),loadCustomers()]).then(()=>{
      state.lastKnownMaxSeq = state.orders.reduce((m,o)=>Math.max(m,o.seq||0),0);
      state.newOrderCount = state.orders.filter(o=>o.status==='New').length;
      render();
      requestNotifyPermission();
      startOrderPolling();
    });
  }
  else{ state.pinError="Incorrect PIN — try again."; renderOfficeView(); }
}
function setOfficeTab(t){ state.officeTab=t; render(); }
function renderLiveBanner(){
  const perm = notifyPermissionStatus();
  let statusTxt, statusColor;
  if(perm==='granted'){ statusTxt='🟢 Live — alerts on. Keep this tab open to hear new orders.'; statusColor='var(--cardamom)'; }
  else if(perm==='denied'){ statusTxt='🔴 Alerts blocked by browser — click the 🔒 icon in the address bar to allow notifications for this site.'; statusColor='var(--chilli)'; }
  else{ statusTxt='🟡 Alerts not enabled yet — click "Enable alerts" below.'; statusColor='var(--turmeric)'; }
  return `<div class="live-banner">
    <span style="color:${statusColor};font-weight:600;">${statusTxt}</span>
    <span class="live-banner-btns">
      ${perm!=='granted' && perm!=='unsupported' ? `<button class="status-btn" onclick="requestNotifyPermission()">🔔 Enable alerts</button>`:''}
      <button class="status-btn" onclick="testAlert()">▶ Test alert</button>
    </span>
  </div>`;
}

function renderOrdersTab(){
  const filters=["All","New","Processing","Billed"];
  let orders=[...state.orders].sort((a,b)=> (b.seq||0)-(a.seq||0));
  if(state.officeStatusFilter!=="All") orders=orders.filter(o=>o.status===state.officeStatusFilter);
  let html=`<div class="status-filters">${filters.map(f=>`<button class="sf-chip ${state.officeStatusFilter===f?'active':''}" onclick="setOfficeFilter('${f}')">${f}</button>`).join('')}</div>`;
  if(orders.length===0){ html+=`<div class="empty-note">No orders here yet.</div>`; return html; }
  html+=`<div class="table-scroll"><table class="orders-table"><thead><tr>
    <th>SR</th><th>Customer</th><th>Date</th><th>Status</th><th>Total</th><th></th>
  </tr></thead><tbody>`;
  orders.forEach(o=>{
    const total=o.items.reduce((s,it)=> s+(it.price!=null? it.price*it.qty:0),0);
    const isOpen = state.expandedOrder===o.id;
    html+=`<tr class="ot-row" onclick="toggleExpandOrder('${o.id}')">
      <td class="ot-sr mono">${refFor(o)}</td>
      <td>${o.name}<div class="ot-phone">${o.phone}</div></td>
      <td>${new Date(o.createdAt).toLocaleDateString()}<div class="ot-phone">${new Date(o.createdAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></td>
      <td><span class="stamp ${o.status}">${o.status}</span></td>
      <td class="mono">${fmt(total)}</td>
      <td class="ot-caret">${isOpen?'▾':'▸'}</td>
    </tr>`;
    if(isOpen){
      html+=`<tr class="ot-detail"><td colspan="6">
        ${o.address? `<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:2px;">Address: ${o.address}</div>`:''}
        ${o.trn? `<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;">TRN: ${o.trn}</div>`:''}
        <div class="oc-items">
          ${o.items.map(it=>`<div class="oc-item-row"><span class="oi-name">${it.name} <span class="oi-meta">(${it.pack} × ${it.qty})</span></span><span class="mono">${it.price!=null? fmt(it.price*it.qty):'Ask price'}</span></div>`).join('')}
        </div>
        ${o.notes? `<div class="oc-notes">Note: ${o.notes}</div>`:''}
        <div class="oc-total"><span>${o.status==='Billed'?'Bill':'Total'}</span><span class="mono">${fmt(total)}</span></div>
        <div class="oc-controls" onclick="event.stopPropagation()">
          ${["New","Processing","Billed"].map(s=>`<button class="status-btn ${o.status===s?'current':''}" onclick="setStatus('${o.id}','${s}')">${s}</button>`).join('')}
          <button class="print-btn" onclick="window.print()">Print</button>
        </div>
      </td></tr>`;
    }
  });
  html+=`</tbody></table></div>`;
  return html;
}
function toggleExpandOrder(id){ state.expandedOrder = state.expandedOrder===id? null : id; render(); }
function setOfficeFilter(f){ state.officeStatusFilter=f; render(); }
async function setStatus(id,status){
  await loadOrders();
  const o=state.orders.find(x=>x.id===id); if(o){ o.status=status; }
  await saveOrders();
  await updateNewOrderCount();
  render();
}

function renderCustomersTab(){
  let html=`<p style="color:var(--ink-soft);font-size:13px;margin-bottom:14px;">Everyone who has registered a store profile while ordering.</p>`;
  if(state.customers.length===0){ html+=`<div class="empty-note">No customers registered yet.</div>`; return html; }
  const list=[...state.customers].sort((a,b)=>(b.seq||0)-(a.seq||0));
  html+=`<div class="table-scroll"><table class="orders-table"><thead><tr>
    <th>SR</th><th>Name</th><th>Phone</th><th>Address</th><th>TRN</th><th>Registered</th>
  </tr></thead><tbody>`;
  list.forEach(c=>{
    html+=`<tr>
      <td class="ot-sr mono">#${String(c.seq).padStart(4,'0')}</td>
      <td>${c.name}</td>
      <td>${c.phone}</td>
      <td>${c.address||'—'}</td>
      <td>${c.trn||'—'}</td>
      <td>${new Date(c.createdAt).toLocaleDateString()}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function renderCatalogTab(){
  let html=`<p style="color:var(--ink-soft);font-size:13px;margin-bottom:14px;">Edit prices, pack sizes, or add new products. Leave a price blank for "Ask price" items. Toggle a product to "Unavailable" if it's out of stock — customers will still see it, but can't order it. Changes save for everyone using this link.</p>`;
  CATEGORIES.forEach(cat=>{
    html+=`<div class="cat-heading">${cat}</div>`;
    state.catalog.filter(p=>p.cat===cat).forEach(p=>{
      const isUnavail=!!p.disabled;
      html+=`<div class="admin-row ${isUnavail?'is-disabled':''}" data-pid="${p.id}">
        <button class="avail-toggle ${isUnavail?'is-unavail':'is-avail'}" onclick="toggleAvailability(${p.id})" title="Toggle availability">
          ${isUnavail? '⛔ Unavailable' : '✅ Available'}
        </button>
        <input class="a-name" value="${p.name}" placeholder="English name" onchange="editProduct(${p.id},'name',this.value)">
        <input class="a-name" value="${p.ml||''}" placeholder="Malayalam name" onchange="editProduct(${p.id},'ml',this.value)">
        <input class="a-name" value="${p.hi||''}" placeholder="Hindi name" onchange="editProduct(${p.id},'hi',this.value)">
        ${p.packs.map((pk,i)=>`<span style="display:flex;gap:4px;align-items:center;">
          <input class="a-pack" value="${pk.l}" onchange="editPack(${p.id},${i},'l',this.value)">
          <input class="a-price" type="number" step="0.5" value="${pk.p==null?'':pk.p}" placeholder="Ask" onchange="editPack(${p.id},${i},'p',this.value)">
          <button class="del-x" onclick="deletePack(${p.id},${i})" title="Remove pack">×</button>
        </span>`).join('')}
        <button class="add-pack-btn" onclick="addPack(${p.id})">+ pack</button>
        <button class="del-x" onclick="deleteProduct(${p.id})" title="Delete product">🗑</button>
      </div>`;
    });
  });
  html+=`<button class="add-prod-btn" onclick="addProduct()">+ Add new product</button>
    <div class="save-bar"><button class="primary-btn" style="width:auto;padding:11px 22px;" onclick="doSaveCatalog()">Save catalog</button><span class="saved-flash" id="savedFlash" style="display:${state.savedFlash?'inline':'none'}">Saved ✓</span></div>`;
  return html;
}
function editProduct(pid,field,val){ const p=findProduct(pid); if(p) p[field]=val; }
function editPack(pid,idx,field,val){ const p=findProduct(pid); if(!p) return; if(field==='p'){ p.packs[idx].p = val===''? null : parseFloat(val); } else { p.packs[idx].l = val; } }
function deletePack(pid,idx){ const p=findProduct(pid); if(!p) return; p.packs.splice(idx,1); render(); }
function addPack(pid){ const p=findProduct(pid); if(!p) return; p.packs.push({l:"New pack",p:null}); render(); }
function deleteProduct(pid){ if(!confirm("Remove this product from the catalog?")) return; state.catalog=state.catalog.filter(p=>p.id!==pid); render(); }
function toggleAvailability(pid){ const p=findProduct(pid); if(!p) return; p.disabled=!p.disabled; render(); }
function addProduct(){
  const maxId=state.catalog.reduce((m,p)=>Math.max(m,p.id),0);
  state.catalog.push({id:maxId+1,cat:CATEGORIES[0],name:"New product",ml:"",hi:"",disabled:false,packs:[{l:"Unit",p:null}]});
  render();
}
async function doSaveCatalog(){ await saveCatalog(); state.savedFlash=true; render(); setTimeout(()=>{ state.savedFlash=false; },2500); }

function render(){
  renderNav();
  if(state.view==="order") renderOrderView();
  else renderOfficeView();
  renderFooter();
}
function renderFooter(){
  let f=document.querySelector('.footer-note');
  if(state.view!=="order"){ if(f) f.remove(); }
  if(state.view!=="order"){ removeHelpFab(); return; }
  if(!f){ f=document.createElement('div'); f.className='footer-note'; document.getElementById('app').appendChild(f); }
  f.innerHTML=`<button onclick="goOffice()">Office login</button>`;
  document.getElementById('app').appendChild(f);
  renderHelpFab();
}
function renderHelpFab(){
  let fab=document.querySelector('.help-fab');
  if(!fab){
    fab=document.createElement('a');
    fab.className='help-fab';
    fab.target='_blank'; fab.rel='noopener';
    document.body.appendChild(fab);
  }
  fab.href=helpWaLink();
  fab.innerHTML='💬 Need help?';
}
function removeHelpFab(){ const fab=document.querySelector('.help-fab'); if(fab) fab.remove(); }

(async function init(){
  await loadCatalog();
  await updateNewOrderCount();
  render();
})();
</script>
</body>
</html>
